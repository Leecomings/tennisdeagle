name: iostennis
description: TennisEye 网球鹰眼系统 iOS端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  camera: ^0.10.5+9
  permission_handler: ^11.1.0
  path_provider: ^2.1.2
  video_player: ^2.8.2
  chewie: ^1.7.5
  fl_chart: ^0.66.2
  mobile_scanner: ^3.5.5
  web_socket_channel: ^2.4.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  image_picker: ^1.0.7
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
